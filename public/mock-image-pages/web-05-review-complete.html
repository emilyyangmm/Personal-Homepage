<!doctype html><html><head><meta charset="utf-8"><style>
  *{box-sizing:border-box} body{margin:0;background:#efece5;font-family:Inter,'Microsoft YaHei',Arial,sans-serif;color:#171717} .shot{width:1260px;min-height:900px;padding:44px 56px;background:linear-gradient(135deg,#f8f6f0,#edf4f8)}
  .brand{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px}.logo{font-weight:900;color:#9b184d;font-size:32px;letter-spacing:.08em}.steps{display:flex;gap:10px}.steps span{padding:12px 34px;border-radius:8px;background:#fff;border:1px solid #ded8ce;color:#777;font-weight:800}.steps .on{background:#b63372;color:#fff;border-color:#b63372}.panel{border:1px solid #d8d0c5;border-radius:12px;background:rgba(255,255,255,.86);box-shadow:0 22px 60px rgba(30,24,18,.11);padding:28px}.eyebrow{color:#a37823;text-transform:uppercase;font-size:13px;font-weight:900;letter-spacing:.18em;margin:0 0 12px}.title{font-size:42px;line-height:1.08;margin:0 0 10px}.desc{font-size:18px;color:#555;line-height:1.7;margin:0 0 24px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.card{border:1px solid #d7cfc4;border-radius:10px;background:#fff;overflow:hidden;position:relative}.card img{width:100%;height:168px;object-fit:cover;display:block}.card strong{display:block;font-size:20px;padding:16px 16px 4px}.card p{margin:0;padding:0 16px 18px;color:#777}.selected{outline:4px solid #b63372}.badge{position:absolute;top:12px;right:12px;background:#b63372;color:#fff;border-radius:999px;padding:8px 12px;font-weight:900}.tabs{display:flex;gap:12px;margin:10px 0 24px}.tabs span{flex:1;text-align:center;border:1px solid #d8d0c5;border-radius:8px;padding:16px;background:#fff;font-weight:900;color:#8f2a5d}.tabs .on{background:#b63372;color:#fff;border-color:#b63372}.param-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.param{min-height:116px;padding:18px;border:1px solid #d8d0c5;border-radius:10px;background:#fff}.param strong{display:block;font-size:20px;margin-bottom:8px}.param p{margin:0;color:#666;line-height:1.5}.param.on{border-color:#b63372;box-shadow:0 0 0 3px rgba(182,51,114,.13)}.review{display:grid;grid-template-columns:1fr 1fr;gap:18px}.review section{padding:22px;border:1px solid #d8d0c5;border-radius:10px;background:#fff}.review h3{margin:0 0 14px;font-size:22px}.chips{display:flex;flex-wrap:wrap;gap:10px}.chips span{padding:10px 14px;border-radius:999px;background:#f1e6ec;color:#98285b;font-weight:800}.prompt{font-size:18px;line-height:1.8;color:#333}.result{display:grid;grid-template-columns:.9fr 1.1fr;gap:26px;align-items:start}.result img{width:100%;max-height:620px;object-fit:cover;border-radius:12px;border:1px solid #d8d0c5;box-shadow:0 20px 50px rgba(0,0,0,.15)}.meta{padding:24px;border:1px solid #d8d0c5;border-radius:12px;background:#fff}.meta h3{font-size:32px;margin:0 0 14px}.meta dl{display:grid;grid-template-columns:120px 1fr;gap:12px 18px;font-size:17px}.meta dt{font-weight:900}.meta dd{margin:0;color:#555}.button{margin-top:22px;background:#b63372;color:#fff;text-align:center;padding:18px;border-radius:8px;font-size:20px;font-weight:900}
</style></head><body><div class="shot"><div class="brand"><div class="logo">小绘画智能体</div><div class="steps"><span>灵感</span><span>风格</span><span>参数</span><span class="on">生成确认</span></div></div><main class="panel"><p class="eyebrow">Step 05 / Review</p><h1 class="title">生成前配置回顾：已选风格和参数会汇总成完整提示词</h1><p class="desc">这里展示一次完整图生图/文生图配置，包含风格、画面比例、镜头、光影、高级特效和反向约束。</p><div class="review"><section><h3>已选配置</h3><div class="chips"><span>木刻版画</span><span>9:16</span><span>中景</span><span>黑白高反差</span><span>人物剪影</span><span>反向：水印/畸形/低清</span></div></section><section><h3>完整提示词</h3><p class="prompt">一位身穿王妃长袍的精灵选手，站在远古森林中，薄雾与樱花环绕，木刻版画水墨风格，柔和体积光，画面细腻，高清质感。</p></section></div><div class="button">开始生成</div></main></div></body></html>
